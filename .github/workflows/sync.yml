name: ⚽ TIPNI TO! - Automatický API Bot

on:
  workflow_dispatch: # 🔌 Spouštění výhradně na pokyn přes externí budík z cron-job.org nebo ručně

# 🟢 VYNUCENÍ NODE.JS 24 PRO VŠECHNY AKCE (Odstraní žlutý vykřičník)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  cron-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Stažení kódu z repozitáře
        uses: actions/checkout@v4

      - name: 🟢 Nastavení Node.js prostředí
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Instalace Firebase Admin balíčku
        run: npm install firebase-admin

      - name: 🚀 Spuštění synchronizačního skriptu bota
        run: node bot.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          LEAGUE_ID: "WC" # Kód mistrovství světa ve fotbale v API (World Cup)
          LEAGUE_NAME: "MS ve fotbale"