name: ⚽ TIPNI TO! - Automatický API Bot

on:
  schedule:
    # 1. HLAVNÍ VEČERNÍ OKNO: Každých 5 minut od 18:00 do 23:55
    - cron: '*/5 18-23 * * *'

    # 2. NOČNÍ A RANNÍ DOJEZD: Každých 5 minut od 00:00 do 08:55 (přechod přes půlnoc)
    - cron: '*/5 0-8 * * *'

    # 3. ROZJEZD UTKÁNÍ (okolo 17:46): Bot zkontroluje situaci v 17:45, 17:50 a 17:55
    - cron: '45,50,55 17 * * *'

    # 4. ZÁVĚREČNÝ DOJEZD (okolo 09:01): Poslední ranní kontrola přesně v 09:00
    - cron: '0 9 * * *'

  workflow_dispatch: # Umožní ti bota kdykoliv odpálit ručně ze záložky Actions na GitHubu

jobs:
  cron-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Stažení kódu z repozitáře
        uses: actions/checkout@v4

      - name: 🟢 Nastavení Node.js prostředí
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Instalace Firebase Admin balíčku
        run: npm install firebase-admin

      - name: 🚀 Spuštění synchronizačního skriptu bota
        run: node bot.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          LEAGUE_ID: "WC" # Kód mistrovství světa v fotbale v API
          LEAGUE_NAME: "MS ve fotbale"